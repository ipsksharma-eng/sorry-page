<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am Sorry! 🥺</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e3f2fd; /* Light blue background for a calming effect */
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden;
            margin: 0;
        }
        .container {
            position: relative;
        }
        img {
            width: 220px;
            border-radius: 10px;
        }
        h2 {
            color: #333;
            margin-top: 15px;
            font-size: 24px;
        }
        .buttons {
            margin-top: 20px;
            position: relative;
            height: 50px;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #4caf50;
            margin-right: 15px;
        }
        #noBtn {
            background-color: #f44336;
            position: absolute;
            transition: 0.2s; /* Smooth running away effect */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Cute Crying/Sad Cat GIF -->
        <img id="image" src="https://media.tenor.com/T_7kM_M08jMAAAAi/peach-cat-crying.gif" alt="Sad GIF">
        <h2 id="question">Mujhe maaf kar do na please? 🥺</h2>
        
        <div class="buttons">
            <button id="yesBtn" onclick="sayYes()">Yes, Maaf kiya</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const image = document.getElementById('image');
        const yesBtn = document.getElementById('yesBtn');

        // Cute pleading texts when they hover over 'No'
        const noTexts = [
            "Aise mat karo, maan jao na! 😭", 
            "Ek aakhiri chance de do? 🥺", 
            "Pakka aage se aisi galti nahi hogi! 🙈", 
            "Tum naraz rehte ho toh accha nahi lagta... 💔",
            "Please please please! 🙏",
            "Mera pyara baccha, maaf kar do! 😿"
        ];
        let noCount = 0;

        function moveNo() {
            // Randomly position the 'No' button
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 100) - (window.innerWidth / 2) + 50;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 100) - (window.innerHeight / 2) + 50;
            
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            
            // Change the text to next pleading message
            if (noCount < noTexts.length) {
                question.innerText = noTexts[noCount];
                noCount++;
            } else {
                // Reset to start if all messages are shown
                noCount = 0;
            }
        }

        function sayYes() {
            // Final happy screen when they click "Yes"
            question.innerText = "Yayyy! Thank you so much! I love you! 🥰❤️";
            // Cute hugging/happy GIF
            image.src = "https://media.tenor.com/12_m_M_hJZEAAAAi/peach-cat-hug.gif";
            noBtn.style.display = "none";
            yesBtn.style.display = "none";
        }
    </script>

</body>
</html>
